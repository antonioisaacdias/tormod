name: staging
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: host
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build image
        run: docker build -t tormod-staging:latest .
      - name: Deploy staging container
        run: docker compose -f compose.staging.yml up -d
